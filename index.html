<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* We use CSS Variables so we can change colors easily with JavaScript */
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
        }
        
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #eaeff2; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { display: flex; gap: 30px; max-width: 1200px; width: 100%; }
        
        /* Left Side: Editor */
        .editor { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 20px; }
        .editor h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; font-size: 13px; }
        input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-pdf { background: #e74c3c; }
        .btn-word { background: #2b579a; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Right Side: Resume Preview */
        .preview-container { flex: 1.2; }
        #resume-paper { 
            width: 210mm; min-height: 297mm; background: white; padding: 20mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); box-sizing: border-box; color: #333;
        }

        /* Resume Content Styling */
        .resume-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: 20px; }
        #photoOut { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; border: 2px solid var(--accent); }
        .header-text h1 { margin: 0; color: var(--primary); text-transform: uppercase; font-size: 24pt; }
        .contact-info { color: #666; font-size: 11pt; margin-top: 5px; }
        
        .section-title { color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 25px; text-transform: uppercase; font-size: 14pt; font-weight: bold; }
        .content-area { line-height: 1.6; white-space: pre-wrap; margin-top: 10px; font-size: 11pt; }
        .skills-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .skill-tag { background: #f0f0f0; padding: 5px 12px; border-radius: 15px; font-size: 10pt; color: var(--primary); border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="editor" role="form">
            <h2>Resume Builder</h2>
            
            <label for="themeSelect">Choose Accent Color</label>
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option value="#3498db">Default Blue</option>
                <option value="#2ecc71">Emerald Green</option>
                <option value="#e67e22">Carrot Orange</option>
                <option value="#9b59b6">Amethyst Purple</option>
                <option value="#2c3e50">Midnight Black</option>
            </select>

            <label for="photoIn">Profile Photo</label>
            <input type="file" id="photoIn" accept="image/*" onchange="updatePhoto(this)" title="Upload a profile picture">

            <label for="nameIn">Full Name</label>
            <input type="text" id="nameIn" placeholder="e.g., Ahmad Alharbi" oninput="updateCV()">
            
            <label for="emailIn">Email & Phone</label>
            <input type="text" id="emailIn" placeholder="e.g., ahmad@email.com | +966..." oninput="updateCV()">
            
            <label for="aboutIn">Professional Summary</label>
            <textarea id="aboutIn" rows="3" placeholder="Write a brief intro..." oninput="updateCV()"></textarea>
            
            <label for="expIn">Experience</label>
            <textarea id="expIn" rows="5" placeholder="Job Title - Company&#10;• Task 1" oninput="updateCV()"></textarea>

            <label for="skillsIn">Skills (comma separated)</label>
            <input type="text" id="skillsIn" placeholder="e.g., Project Management, HTML, Git" oninput="updateCV()">

            <div class="button-group">
                <button class="btn-pdf" onclick="downloadPDF()">Export PDF</button>
                <button class="btn-word" onclick="downloadWord()">Export Word</button>
            </div>
        </div>

        <div class="preview-container">
            <div id="resume-paper">
                <div class="resume-header">
                    <img id="photoOut" src="" alt="Profile Photo Preview">
                    <div class="header-text">
                        <h1 id="nameOut">Your Name</h1>
                        <div class="contact-info" id="emailOut">Contact details will appear here</div>
                    </div>
                </div>

                <div class="section-title">Professional Summary</div>
                <div class="content-area" id="aboutOut">...</div>

                <div class="section-title">Experience</div>
                <div class="content-area" id="expOut">...</div>

                <div class="section-title">Technical Skills</div>
                <div id="skillsOut" class="skills-container"></div>
            </div>
        </div>
    </div>

    <script>
        // Real-time Update Logic
        function updateCV() {
            document.getElementById('nameOut').innerText = document.getElementById('nameIn').value || "Your Name";
            document.getElementById('emailOut').innerText = document.getElementById('emailIn').value || "contact@example.com";
            document.getElementById('aboutOut').innerText = document.getElementById('aboutIn').value || "Summary details...";
            document.getElementById('expOut').innerText = document.getElementById('expIn').value || "Experience details...";
            
            const skillsArr = document.getElementById('skillsIn').value.split(',');
            const skillsDiv = document.getElementById('skillsOut');
            skillsDiv.innerHTML = '';
            skillsArr.forEach(skill => {
                if(skill.trim()){
                    const span = document.createElement('span');
                    span.className = 'skill-tag';
                    span.innerText = skill.trim();
                    skillsDiv.appendChild(span);
                }
            });
        }

        // Theme Switcher Logic
        function changeTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            // Also update the border of the photo to match the theme
            const photo = document.getElementById('photoOut');
            photo.style.borderColor = color;
        }

        // Photo Upload Logic
        function updatePhoto(input) {
            const photo = document.getElementById('photoOut');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    photo.src = e.target.result;
                    photo.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // PDF Generation
        function downloadPDF() {
            const element = document.getElementById('resume-paper');
            const options = {
                margin: 0,
                filename: 'My_Resume.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(options).from(element).save();
        }

        // Word Generation
        function downloadWord() {
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>";
            const footer = "</body></html>";
            const sourceHTML = header + document.getElementById("resume-paper").innerHTML + footer;
            
            const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
            const fileDownload = document.createElement("a");
            fileDownload.href = source;
            fileDownload.download = 'My_Resume.doc';
            fileDownload.click();
        }
    </script>
</body>
</html>
