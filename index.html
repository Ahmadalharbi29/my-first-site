<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic CV Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #eaeff2; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { display: flex; gap: 30px; max-width: 1400px; width: 100%; }
        
        /* Editor Styles */
        .editor { 
            flex: 1; background: white; padding: 25px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 90vh; overflow-y: auto; 
            position: sticky; top: 20px; 
        }
        .editor h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; font-size: 13px; }
        input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .dynamic-block { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--accent); position: relative; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-remove { background: #ff7675; color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; position: absolute; top: 10px; right: 10px; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        button:not(.btn-remove) { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-pdf { background: #e74c3c; } .btn-word { background: #2b579a; } .btn-print { background: #27ae60; grid-column: span 2; }

        /* Preview Styles */
        .preview-container { flex: 1.3; display: flex; flex-direction: column; align-items: center; }
        #resume-paper { 
            width: 210mm; min-height: 297mm; background: white; padding: 15mm 20mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); box-sizing: border-box; color: #333;
        }
        .resume-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        #photoOut { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; display: none; border: 2px solid var(--accent); }
        .header-text h1 { margin: 0; color: var(--primary); font-size: 24pt; text-transform: uppercase; }
        .section-title { color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 20px; text-transform: uppercase; font-size: 13pt; font-weight: bold; }
        .job-entry { margin-bottom: 15px; }
        .job-entry h4 { margin: 10px 0 2px 0; color: #444; }
        .job-meta { font-size: 10pt; color: #777; font-style: italic; }
        .skills-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .skill-tag { background: #f1f2f6; padding: 4px 10px; border-radius: 4px; font-size: 10pt; border-left: 3px solid var(--accent); }

        @media print { .editor { display: none; } #resume-paper { box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="editor">
        <h2>CV Editor</h2>
        <label for="themeSelect">Theme Color</label>
        <select id="themeSelect" onchange="changeTheme(this.value)">
            <option value="#3498db">Default Blue</option>
            <option value="#2ecc71">Emerald Green</option>
            <option value="#e67e22">Carrot Orange</option>
            <option value="#2c3e50">Midnight Black</option>
        </select>

        <label>Photo</label>
        <input type="file" accept="image/*" onchange="updatePhoto(this)">

        <label>Name</label>
        <input type="text" id="nameIn" oninput="saveAndRefresh()">
        
        <label>Contact (Email | Phone | Web)</label>
        <input type="text" id="contactIn" oninput="saveAndRefresh()">

        <label>Summary</label>
        <textarea id="summaryIn" rows="3" oninput="saveAndRefresh()"></textarea>

        <div id="experienceFields">
            <label>Experience</label>
            </div>
        <button class="btn-add" onclick="addJob()">+ Add Job</button>

        <label>Skills (comma separated)</label>
        <input type="text" id="skillsIn" oninput="saveAndRefresh()">

        <div class="button-group">
            <button class="btn-pdf" onclick="downloadPDF()">Save PDF</button>
            <button class="btn-word" onclick="downloadWord()">Save Word</button>
            <button class="btn-print" onclick="window.print()">Print</button>
        </div>
    </div>

    <div class="preview-container">
        <div id="resume-paper">
            <div class="resume-header">
                <img id="photoOut" src="" alt="Profile">
                <div class="header-text">
                    <h1 id="nameOut">Your Name</h1>
                    <div id="contactOut" class="contact-info">contact@example.com</div>
                </div>
            </div>
            <div class="section-title">Profile</div>
            <div id="summaryOut" class="content-area"></div>
            
            <div class="section-title">Experience</div>
            <div id="experienceOut"></div>

            <div class="section-title">Skills</div>
            <div id="skillsOut" class="skills-container"></div>
        </div>
    </div>
</div>

<script>
    let jobs = JSON.parse(localStorage.getItem('cvJobs')) || [];

    function addJob() {
        jobs.push({ title: '', company: '', date: '', desc: '' });
        renderEditorJobs();
        saveAndRefresh();
    }

    function removeJob(index) {
        jobs.splice(index, 1);
        saveAndRefresh();
    }

    function updateJobData(index, field, value) {
        jobs[index][field] = value;
        saveAndRefresh();
    }

    function renderEditorJobs() {
        const container = document.getElementById('experienceFields');
        container.innerHTML = '<label>Experience</label>';
        jobs.forEach((job, i) => {
            container.innerHTML += `
                <div class="dynamic-block">
                    <button class="btn-remove" onclick="removeJob(${i})">×</button>
                    <input type="text" placeholder="Job Title" value="${job.title}" oninput="updateJobData(${i}, 'title', this.value)">
                    <input type="text" placeholder="Company & Year" value="${job.company}" oninput="updateJobData(${i}, 'company', this.value)">
                    <textarea placeholder="Key Accomplishments" oninput="updateJobData(${i}, 'desc', this.value)">${job.desc}</textarea>
                </div>`;
        });
    }

    function saveAndRefresh() {
        // Save to LocalStorage
        localStorage.setItem('cvName', document.getElementById('nameIn').value);
        localStorage.setItem('cvContact', document.getElementById('contactIn').value);
        localStorage.setItem('cvSummary', document.getElementById('summaryIn').value);
        localStorage.setItem('cvSkills', document.getElementById('skillsIn').value);
        localStorage.setItem('cvJobs', JSON.stringify(jobs));

        // Update Preview
        document.getElementById('nameOut').innerText = document.getElementById('nameIn').value || "Your Name";
        document.getElementById('contactOut').innerText = document.getElementById('contactIn').value || "contact@example.com";
        document.getElementById('summaryOut').innerText = document.getElementById('summaryIn').value;
        
        const expOut = document.getElementById('experienceOut');
        expOut.innerHTML = '';
        jobs.forEach(job => {
            expOut.innerHTML += `<div class="job-entry"><h4>${job.title}</h4><div class="job-meta">${job.company}</div><div class="content-area">${job.desc}</div></div>`;
        });

        const skillsDiv = document.getElementById('skillsOut');
        skillsDiv.innerHTML = '';
        document.getElementById('skillsIn').value.split(',').forEach(s => {
            if(s.trim()) skillsDiv.innerHTML += `<span class="skill-tag">${s.trim()}</span>`;
        });
    }

    // Load Data on Start
    window.onload = () => {
        document.getElementById('nameIn').value = localStorage.getItem('cvName') || '';
        document.getElementById('contactIn').value = localStorage.getItem('cvContact') || '';
        document.getElementById('summaryIn').value = localStorage.getItem('cvSummary') || '';
        document.getElementById('skillsIn').value = localStorage.getItem('cvSkills') || '';
        renderEditorJobs();
        saveAndRefresh();
    };

    function changeTheme(color) { document.documentElement.style.setProperty('--accent', color); }
    function updatePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                document.getElementById('photoOut').src = e.target.result;
                document.getElementById('photoOut').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function downloadPDF() { html2pdf().from(document.getElementById('resume-paper')).set({ margin:0, filename:'CV.pdf', html2canvas:{scale:2}, jsPDF:{unit:'mm',format:'a4'} }).save(); }
    function downloadWord() { window.location.href = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(document.getElementById("resume-paper").innerHTML); }
</script>
</body>
</html>
