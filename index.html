<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CV Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; }
        body { font-family: 'Inter', sans-serif; background: #eaeff2; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { display: flex; gap: 30px; max-width: 1400px; width: 100%; }
        
        .editor { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 90vh; overflow-y: auto; position: sticky; top: 20px; }
        .auth-bar { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #ccc; text-align: center; }
        
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 13px; color: #555; }
        input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-cloud { background: var(--success); grid-column: span 2; margin-bottom: 10px; }
        .btn-pdf { background: #e74c3c; } .btn-word { background: #2b579a; }
        
        .preview-container { flex: 1.3; display: flex; flex-direction: column; align-items: center; }
        #resume-paper { width: 210mm; min-height: 297mm; background: white; padding: 20mm; box-shadow: 0 0 20px rgba(0,0,0,0.2); box-sizing: border-box; }
        
        .section-title { color: var(--accent); border-bottom: 1px solid #eee; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
        .skill-tag { background: #f1f2f6; padding: 4px 10px; border-radius: 4px; font-size: 9pt; border-left: 3px solid var(--accent); margin: 3px; display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="editor">
        <div class="auth-bar" id="authStatus">
            <span>Cloud Sync: <strong>Off</strong></span>
            <button onclick="login()" style="background:none; color:var(--accent); border:none; padding:0; text-decoration:underline; font-size:12px; margin-left:10px; cursor:pointer;">Login with Google</button>
        </div>

        <h2>Cloud CV Editor</h2>
        
        <button class="btn-cloud" onclick="saveToCloud()">☁ Save to Cloud Account</button>

        <label for="nameIn">Full Name</label>
        <input type="text" id="nameIn" oninput="updatePreview()">
        
        <label for="contactIn">Contact Info</label>
        <input type="text" id="contactIn" oninput="updatePreview()">

        <label for="summaryIn">Summary</label>
        <textarea id="summaryIn" rows="3" oninput="updatePreview()"></textarea>

        <label for="skillsIn">Skills (comma separated)</label>
        <input type="text" id="skillsIn" oninput="updatePreview()">

        <div class="button-group">
            <button class="btn-pdf" onclick="downloadPDF()">Export PDF</button>
            <button class="btn-word" onclick="downloadWord()">Export Word</button>
        </div>
    </div>

    <div class="preview-container">
        <div id="resume-paper">
            <h1 id="nameOut">Your Name</h1>
            <p id="contactOut">Contact Info</p>
            <div class="section-title">Profile</div>
            <p id="summaryOut">Summary text...</p>
            <div class="section-title">Skills</div>
            <div id="skillsOut"></div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (You will replace this with your own from Firebase Console) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "your-app.firebaseapp.com",
        projectId: "your-app",
        storageBucket: "your-app.appspot.com",
        messagingSenderId: "12345",
        appId: "1:12345:web:6789"
    };
    
    // Initialize Firebase (Checks if config is valid)
    if(firebaseConfig.apiKey !== "YOUR_API_KEY") {
        firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth?.();
    const db = firebase.firestore?.();

    function updatePreview() {
        document.getElementById('nameOut').innerText = document.getElementById('nameIn').value || "Your Name";
        document.getElementById('contactOut').innerText = document.getElementById('contactIn').value || "Contact Info";
        document.getElementById('summaryOut').innerText = document.getElementById('summaryIn').value;
        
        const skillsDiv = document.getElementById('skillsOut');
        skillsDiv.innerHTML = '';
        document.getElementById('skillsIn').value.split(',').forEach(s => {
            if(s.trim()) skillsDiv.innerHTML += `<span class="skill-tag">${s.trim()}</span>`;
        });
    }

    async function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            document.getElementById('authStatus').innerHTML = `Logged in as: <strong>${result.user.displayName}</strong>`;
            loadUserCloudData(result.user.uid);
        } catch (error) {
            alert("Login failed: " + error.message);
        }
    }

    async function saveToCloud() {
        const user = auth?.currentUser;
        if (!user) return alert("Please login first to save to cloud!");

        const data = {
            name: document.getElementById('nameIn').value,
            contact: document.getElementById('contactIn').value,
            summary: document.getElementById('summaryIn').value,
            skills: document.getElementById('skillsIn').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("resumes").doc(user.uid).set(data);
            alert("Saved to cloud successfully! ☁");
        } catch (error) {
            console.error(error);
            alert("Error saving: Use 'Local Storage' until Firebase is configured.");
        }
    }

    function downloadPDF() { html2pdf().from(document.getElementById('resume-paper')).save(); }
</script>
</body>
</html>
